<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | Mr. Dance Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }
      .login-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
      }
      .input-focus:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }
    </style>
  </head>
  <body class="h-screen flex items-center justify-center p-4">
    <div
      class="login-card p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/20"
    >
      <div class="text-center mb-10 -mt-4">
        <div
          class="mb-6 flex items-center justify-center w-full max-h-32 overflow-hidden"
        >
          <img
            src="assets/Logo_Mr_Dance_S.png"
            alt="Mr. Dance Boutique"
            class="w-auto h-full max-h-28 object-contain"
          />
        </div>

        <h1
          class="text-3xl font-extrabold text-slate-900 tracking-tighter uppercase"
        >
          Mr. Dance <span class="text-blue-600 font-light">Boutique</span>
        </h1>
        <p
          class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-2"
        >
          Acceso Administrativo
        </p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div class="space-y-2">
          <label
            class="block text-xs font-black uppercase text-slate-500 ml-1 tracking-wider"
            >Identificación de Usuario</label
          >
          <div class="relative">
            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              >👤</span
            >
            <input
              type="text"
              id="usuario"
              required
              placeholder="Ingresa tu ID"
              class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all font-semibold text-slate-800"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label
            class="block text-xs font-black uppercase text-slate-500 ml-1 tracking-wider"
            >Clave de Seguridad</label
          >
          <div class="relative">
            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              >🔒</span
            >
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all font-semibold text-slate-800"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-extrabold shadow-lg shadow-blue-200 transition-all duration-300 transform active:scale-[0.98] uppercase tracking-widest text-sm"
        >
          Entrar al Sistema
        </button>
      </form>

      <div
        id="mensaje"
        class="mt-6 p-4 rounded-xl bg-red-50 text-red-600 text-sm font-bold text-center hidden animate-bounce"
      ></div>

      <div class="mt-8 text-center">
        <p
          class="text-slate-400 text-[10px] uppercase font-bold tracking-widest leading-loose"
        >
          Sistema de gestión de inventario<br />
          &copy; 2026 Mr. Dance Boutique - V 1.0
        </p>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const mensajeDiv = document.getElementById("mensaje");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const usuario = document.getElementById("usuario").value;
        const password = document.getElementById("password").value;

        // Limpiar mensaje previo
        mensajeDiv.classList.add("hidden");

        try {
          const response = await fetch("http://localhost:4000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usuario, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("userNombre", data.user.nombre);
            localStorage.setItem("userRol", data.user.rol);

            // Efecto de éxito antes de redirigir
            mensajeDiv.textContent = "¡Acceso Concedido!";
            mensajeDiv.className =
              "mt-6 p-4 rounded-xl bg-green-50 text-green-600 text-sm font-bold text-center";
            mensajeDiv.classList.remove("hidden");

            setTimeout(() => {
              window.location.href = "inventario.html";
            }, 1000);
          } else {
            mensajeDiv.textContent =
              "❌ " + (data.message || "Credenciales inválidas");
            mensajeDiv.classList.remove("hidden");
          }
        } catch (error) {
          console.error("Error:", error);
          mensajeDiv.textContent = "⚠️ Error de conexión con el servidor";
          mensajeDiv.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
