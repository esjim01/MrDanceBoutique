<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes | Mr. Dance Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #f0f2f5;
        }

        .header-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="text-slate-800 overflow-hidden h-screen flex flex-col">
    <nav class="header-gradient text-white px-8 py-4 shadow-xl flex justify-between items-center z-40 relative">
        <div class="flex items-center gap-3">
            <img src="assets/Logo_Mr_Dance_S_White.png" alt="Mr. Dance Boutique" class="w-auto h-10 object-contain"
                onerror="this.src='https://via.placeholder.com/40x40?text=MD'" />
            <h1 class="font-extrabold text-xl tracking-tight hidden sm:block">MR. DANCE <span
                    class="text-blue-400 font-light">BOUTIQUE</span></h1>
        </div>
        <button onclick="logout()"
            class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/50 px-5 py-1.5 rounded-lg text-sm font-bold transition-all">SALIR</button>
    </nav>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden bg-slate-50">
        <aside class="w-full md:w-60 bg-slate-900 text-white flex flex-col flex-shrink-0 shadow-2xl z-30">
            <nav
                class="flex flex-row md:flex-col p-2 md:p-4 space-x-2 md:space-x-0 md:space-y-1 md:mt-4 overflow-x-auto whitespace-nowrap">
                <a href="inventario.html"
                    class="flex items-center gap-3 text-slate-500 hover:text-slate-300 hover:bg-slate-800 px-4 py-3 rounded-xl font-bold text-sm transition-all">
                    <span>📈</span> Inventario
                </a>
                <a href="gastos.html"
                    class="flex items-center gap-3 text-slate-500 hover:text-slate-300 hover:bg-slate-800 px-4 py-3 rounded-xl font-bold text-sm transition-all">
                    <span>💰</span> Gastos
                </a>
                <a href="ventas.html"
                    class="flex items-center gap-3 text-slate-500 hover:text-slate-300 hover:bg-slate-800 px-4 py-3 rounded-xl font-bold text-sm transition-all">
                    <span>🛍️</span> Punto de Venta
                </a>
                <a href="reportes.html"
                    class="flex items-center gap-3 bg-slate-800 text-white px-4 py-3 rounded-xl font-bold text-sm transition-all border-b-4 md:border-b-0 md:border-l-4 border-blue-500">
                    <span>📊</span> Reportes
                </a>
                <a href="gastos_hogar.html"
                    class="flex items-center gap-3 text-slate-500 hover:text-slate-300 hover:bg-slate-800 px-4 py-3 rounded-xl font-bold text-sm transition-all">
                    <span>🏠</span> Gastos Hogar
                </a>
            </nav>

            <div class="hidden md:block p-4 border-t border-slate-800 bg-[#0a0f1d]">
                <div class="flex items-center gap-3 p-2">
                    <div
                        class="w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center font-bold text-lg shadow-inner">
                        <span id="userInitial">A</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p id="userNameDisplay" class="font-bold text-sm truncate uppercase tracking-tight text-white">
                            Cargando...
                        </p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            Administrador
                        </p>
                    </div>
                    <button onclick="logout()" class="text-slate-500 hover:text-red-400 transition-colors">
                        🚪
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden relative">

            <div
                class="bg-white border-b border-slate-200 px-8 py-4 flex flex-wrap justify-between items-center z-20 gap-4">
                <h2 class="text-xl font-extrabold text-slate-800 uppercase tracking-tight">Tablero Financiero</h2>

                <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex flex-col px-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Desde</label>
                        <input type="date" id="filtroDesde"
                            class="text-sm font-bold text-slate-700 outline-none bg-transparent cursor-pointer">
                    </div>
                    <div class="w-px h-8 bg-slate-300"></div>
                    <div class="flex flex-col px-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Hasta</label>
                        <input type="date" id="filtroHasta"
                            class="text-sm font-bold text-slate-700 outline-none bg-transparent cursor-pointer">
                    </div>
                    <button onclick="procesarReportes()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-md">
                        Filtrar
                    </button>
                    <button onclick="limpiarFiltros()"
                        class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded-lg font-bold text-sm transition-all"
                        title="Ver todo">
                        🔄
                    </button>
                </div>

                <button onclick="exportarExcel()"
                    class="flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-extrabold text-sm transition-all shadow-lg shadow-emerald-200 active:scale-95">
                    <span>📊</span> Descargar Excel
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 block">
                <div class="max-w-7xl mx-auto space-y-6">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div
                            class="bg-white rounded-2xl p-6 border border-slate-200 custom-shadow flex flex-col justify-center relative overflow-hidden">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-50 rounded-full opacity-50"></div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 relative z-10">
                                Ventas Totales</h3>
                            <p id="kpiVentas" class="text-3xl font-extrabold text-blue-600 relative z-10">$0</p>
                        </div>

                        <div
                            class="bg-white rounded-2xl p-6 border border-slate-200 custom-shadow flex flex-col justify-center relative overflow-hidden">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-rose-50 rounded-full opacity-50"></div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 relative z-10">
                                Gastos Totales</h3>
                            <p id="kpiGastos" class="text-3xl font-extrabold text-rose-500 relative z-10">$0</p>
                        </div>

                        <div
                            class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl flex flex-col justify-center relative overflow-hidden">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-emerald-500/10 rounded-full"></div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1 relative z-10">
                                Ganancia Neta</h3>
                            <p id="kpiGanancia" class="text-3xl font-extrabold text-emerald-400 relative z-10">$0</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 pb-20">

                        <div class="bg-white p-6 rounded-2xl border border-slate-200 custom-shadow lg:col-span-2">
                            <h3 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-4">📈 Curva de
                                Ventas por Día</h3>
                            <div class="relative h-[300px] w-full">
                                <canvas id="chartCurvaVentas"></canvas>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl border border-slate-200 custom-shadow">
                            <h3 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-4">🍩 Gastos
                                por Categoría</h3>
                            <div class="relative h-[300px] w-full flex items-center justify-center">
                                <canvas id="chartGastos"></canvas>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl border border-slate-200 custom-shadow lg:col-span-3">
                            <h3 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-4">🏆 Top 5
                                Zapatos Más Vendidos (Unidades)</h3>
                            <div class="relative h-[300px] w-full">
                                <canvas id="chartTopProductos"></canvas>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let ventasRaw = [];
        let gastosRaw = [];

        // Variables para destruir los gráficos anteriores y no superponerlos
        let grafCurva = null;
        let grafGastos = null;
        let grafTop = null;

        async function init() {
            await cargarDatos();
            procesarReportes(); // Renderiza por primera vez con todos los datos
        }

        async function cargarDatos() {
            try {
                // LLamamos a nuestras APIs
                const [resVentas, resGastos] = await Promise.all([
                    fetch("/api/ventas").catch(() => ({ ok: false })),
                    fetch("/api/gastos").catch(() => ({ ok: false }))
                ]);

                if (resVentas.ok) ventasRaw = await resVentas.json();
                if (resGastos.ok) gastosRaw = await resGastos.json();

            } catch (error) {
                console.error("Error conectando al backend para reportes", error);
                alert("Advertencia: No se pudieron cargar los datos del servidor.");
            }
        }

        // --- NORMALIZADOR DE FECHAS ---
        function parsearFechaVenta(fechaStr) {
            // Convierte "15/4/2026, 19:41:36" a "2026-04-15"
            if (!fechaStr) return "";
            const [fechaPart] = fechaStr.split(',');
            const partes = fechaPart.trim().split('/');
            const dia = partes[0].padStart(2, '0');
            const mes = partes[1].padStart(2, '0');
            const ano = partes[2];
            return `${ano}-${mes}-${dia}`;
        }

        // --- MOTOR PRINCIPAL DE PROCESAMIENTO ---
        function procesarReportes() {
            const fechaDesde = document.getElementById('filtroDesde').value;
            const fechaHasta = document.getElementById('filtroHasta').value;

            // 1. Filtrar Ventas
            const ventasFiltradas = ventasRaw.filter(v => {
                const fechaV = parsearFechaVenta(v.fechaHora);
                if (fechaDesde && fechaV < fechaDesde) return false;
                if (fechaHasta && fechaV > fechaHasta) return false;
                return true;
            });

            // 2. Filtrar Gastos
            const gastosFiltrados = gastosRaw.filter(g => {
                const fechaG = g.fechaGasto; // Ya viene en YYYY-MM-DD
                if (fechaDesde && fechaG < fechaDesde) return false;
                if (fechaHasta && fechaG > fechaHasta) return false;
                return true;
            });

            // 3. Calcular KPIs
            const totalVentas = ventasFiltradas.reduce((sum, v) => sum + Number(v.total), 0);
            const totalGastos = gastosFiltrados.reduce((sum, g) => sum + Number(g.valor), 0);
            const gananciaNeta = totalVentas - totalGastos;

            document.getElementById('kpiVentas').textContent = `$${totalVentas.toLocaleString()}`;
            document.getElementById('kpiGastos').textContent = `$${totalGastos.toLocaleString()}`;
            document.getElementById('kpiGanancia').textContent = `$${gananciaNeta.toLocaleString()}`;

            // Cambiar color de ganancia si es negativa
            const gananciaElement = document.getElementById('kpiGanancia');
            if (gananciaNeta < 0) {
                gananciaElement.className = "text-3xl font-extrabold text-red-500 relative z-10";
            } else {
                gananciaElement.className = "text-3xl font-extrabold text-emerald-400 relative z-10";
            }

            // 4. Renderizar Gráficos
            generarGraficoCurvaVentas(ventasFiltradas);
            generarGraficoGastos(gastosFiltrados);
            generarGraficoTopProductos(ventasFiltradas);
        }

        function limpiarFiltros() {
            document.getElementById('filtroDesde').value = '';
            document.getElementById('filtroHasta').value = '';
            procesarReportes();
        }

        // --- GRÁFICO 1: CURVA DE VENTAS ---
        function generarGraficoCurvaVentas(ventas) {
            const ctx = document.getElementById('chartCurvaVentas').getContext('2d');
            if (grafCurva) grafCurva.destroy(); // Limpiar viejo

            // Agrupar ventas por día
            const ventasPorDia = {};
            ventas.forEach(v => {
                const fecha = parsearFechaVenta(v.fechaHora);
                ventasPorDia[fecha] = (ventasPorDia[fecha] || 0) + Number(v.total);
            });

            // Ordenar fechas cronológicamente
            const labels = Object.keys(ventasPorDia).sort();
            const data = labels.map(l => ventasPorDia[l]);

            grafCurva = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ventas Diarias ($)',
                        data: data,
                        borderColor: '#2563eb', // Blue-600
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#2563eb',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.4 // Curva suave
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [5, 5] } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // --- GRÁFICO 2: GASTOS POR CATEGORÍA ---
        function generarGraficoGastos(gastos) {
            const ctx = document.getElementById('chartGastos').getContext('2d');
            if (grafGastos) grafGastos.destroy();

            const categoriasObj = {};
            gastos.forEach(g => {
                categoriasObj[g.categoria] = (categoriasObj[g.categoria] || 0) + Number(g.valor);
            });

            const labels = Object.keys(categoriasObj);
            const data = Object.values(categoriasObj);
            // Paleta de colores atractiva
            const colores = ['#f43f5e', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899'];

            grafGastos = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colores,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    cutout: '70%', // Grosor de la dona
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'Plus Jakarta Sans', weight: 'bold' } } }
                    }
                }
            });
        }

        // --- GRÁFICO 3: TOP 5 PRODUCTOS ---
        function generarGraficoTopProductos(ventas) {
            const ctx = document.getElementById('chartTopProductos').getContext('2d');
            if (grafTop) grafTop.destroy();

            const conteoProductos = {};

            // Recorrer ventas y luego los productos dentro de la venta
            ventas.forEach(v => {
                v.productos.forEach(p => {
                    conteoProductos[p.referencia] = (conteoProductos[p.referencia] || 0) + Number(p.cantidad);
                });
            });

            // Convertir a Array, ordenar de mayor a menor y tomar los primeros 5
            const top5 = Object.entries(conteoProductos)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const labels = top5.map(item => item[0]); // Referencias
            const data = top5.map(item => item[1]); // Cantidades

            grafTop = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Unidades Vendidas',
                        data: data,
                        backgroundColor: '#10b981', // Emerald-500
                        borderRadius: 8,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [5, 5] }, ticks: { stepSize: 1 } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // --- EXPORTAR A EXCEL (SHEETJS) ---
        function exportarExcel() {
            const fechaDesde = document.getElementById('filtroDesde').value;
            const fechaHasta = document.getElementById('filtroHasta').value;

            // Filtramos igual que en el tablero
            const ventasFiltradas = ventasRaw.filter(v => {
                const fV = parsearFechaVenta(v.fechaHora);
                if (fechaDesde && fV < fechaDesde) return false;
                if (fechaHasta && fV > fechaHasta) return false;
                return true;
            });

            const gastosFiltrados = gastosRaw.filter(g => {
                const fG = g.fechaGasto;
                if (fechaDesde && fG < fechaDesde) return false;
                if (fechaHasta && fG > fechaHasta) return false;
                return true;
            });

            // 1. Preparar datos de Ventas para Excel (Aplanando los arrays de productos)
            const filasVentas = [];
            ventasFiltradas.forEach(v => {
                v.productos.forEach(p => {
                    filasVentas.push({
                        "ID Venta": v.id,
                        "Fecha y Hora": v.fechaHora,
                        "Referencia Zapato": p.referencia,
                        "Talla": p.talla,
                        "Tacón": p.tacon,
                        "Unidades": p.cantidad,
                        "Precio Unitario Cobrado": p.precioCobrado,
                        "Subtotal Producto": p.cantidad * p.precioCobrado,
                        "Total Venta": v.total // Total global de la factura
                    });
                });
            });

            // 2. Preparar datos de Gastos para Excel
            const filasGastos = gastosFiltrados.map(g => ({
                "ID Gasto": g.id,
                "Fecha Gasto": g.fechaGasto,
                "Categoría": g.categoria,
                "Concepto": g.concepto,
                "Valor Pagado": g.valor,
                "Registrado Por": g.registradoPor
            }));

            // Validar que haya datos
            if (filasVentas.length === 0 && filasGastos.length === 0) {
                alert("No hay datos en este rango de fechas para exportar.");
                return;
            }

            // Crear el libro de Excel (Workbook)
            const wb = XLSX.utils.book_new();

            // Pestaña Ventas
            if (filasVentas.length > 0) {
                const wsVentas = XLSX.utils.json_to_sheet(filasVentas);
                XLSX.utils.book_append_sheet(wb, wsVentas, "Ventas");
            }

            // Pestaña Gastos
            if (filasGastos.length > 0) {
                const wsGastos = XLSX.utils.json_to_sheet(filasGastos);
                XLSX.utils.book_append_sheet(wb, wsGastos, "Gastos");
            }

            // Generar archivo y descargar
            const sufijo = (fechaDesde && fechaHasta) ? `${fechaDesde}_al_${fechaHasta}` : 'Historico';
            XLSX.writeFile(wb, `Reporte_Financiero_MD_${sufijo}.xlsx`);
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        function cargarInfoUsuario() {
            const nombre = localStorage.getItem("userNombre") || "Invitado";
            const inicial = nombre.charAt(0).toUpperCase();
            document.getElementById("userNameDisplay").textContent = nombre;
            document.getElementById("userInitial").textContent = inicial;
        }

        // Arrancar
        init();
        cargarInfoUsuario();
    </script>
</body>

</html>
